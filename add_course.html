    <main>
        <form action="my_courses.html" method="get" target="_blank">
            <img src="images/meet.jpeg" alt="meeting">
            
            <label for="name"> course name </label>
            <input type="text" id="name" name="name" class="input" required>
            
            <label for="instructor"> instructor name</label>
            <input type="text" id="instructor" name="instructor_first_name" placeholder="First Name" class="instructor input" required>
            <input type="text" name="instructor_last_name" placeholder="Last Name" class="instructor input" required>

            <label for="credits"> credit hours</label>
            <input type="number" id="credits" name="credit_hours" value="0" max="5" min="0" class="credit input" required>

            <label for="note"> note </label>
            <input type="text" id="note" name="note" maxlength="28" placeholder="  small note" class="input">

            <input type="submit" value="done" class="button-sub">
            <input type="reset" class="button-reset">
            
            <input type="submit" class="hide">
            <input type="reset" class="hide">
        </form>
    </main>
